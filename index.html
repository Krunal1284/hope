<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ishita 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">

<style>
:root {
  --sf: -apple-system,"SF Pro Text","SF Pro Display","Helvetica Neue",sans-serif;
  --lora: 'Lora', Georgia, serif;
  --dance: 'Dancing Script', cursive;
  --rose: #d4547a;
  --rose2: #b03060;
  --bg: #fdf0f4;
  --paper: #fff8f5;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--sf);background:var(--bg);overflow-x:hidden;}

.screen{display:none;min-height:100vh;}
.screen.active{display:block;}

#scene-end{
  display:none;
  position:fixed;
  inset:0;
  background:linear-gradient(155deg,#ffe0ec,#fff5f8,#fce8f3);
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  z-index:300;
}
#scene-end.show{display:flex;}

.end-wrap h2{
  font-family:var(--dance);
  font-size:40px;
  color:var(--rose2);
}

.end-btn{
  margin-top:20px;
  padding:14px 28px;
  border:none;
  border-radius:30px;
  background:var(--rose);
  color:white;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 🎵 AUDIO -->
<audio id="bg-music">
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- ═══ SCREEN 1 (KEEP YOUR FULL CONTENT HERE) ═══ -->
<div class="screen active" id="screen1">
  <h1 style="text-align:center;padding-top:100px;">Your Love Letter 💌</h1>

  <div style="text-align:center;margin-top:50px;">
    <button onclick="goToEnd()" style="padding:12px 24px;border:none;background:#d4547a;color:#fff;border-radius:20px;">
      Continue →
    </button>
  </div>
</div>

<!-- ═══ END SCREEN ═══ -->
<div id="scene-end">
  <div class="end-wrap">
    <span style="font-size:50px;">💖</span>
    <h2>Always & Forever</h2>
    <p style="margin-top:10px;">Final Message for Ishita</p>

    <!-- MUSIC BUTTON (IMPORTANT FIX) -->
    <button class="end-btn" onclick="startMusic()">
      🎵 Play Final Song
    </button>
  </div>
</div>

<script>

function goToEnd(){
  document.getElementById("screen1").classList.remove("active");
  document.getElementById("scene-end").classList.add("show");
}

/* 🎵 GUARANTEED WORKING MUSIC */
function startMusic(){
  const music = document.getElementById("bg-music");

  music.currentTime = 60; // start at 1:00

  const playPromise = music.play();

  if (playPromise !== undefined) {
    playPromise.then(() => {
      
      // stop at 1:40 (40 sec later)
      setTimeout(() => {
        music.pause();
      }, 40000);

    }).catch(err => {
      alert("Tap again to enable sound 🔊");
    });
  }
}

</script>

</body>
</html>
