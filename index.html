<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ishita 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">

<style>
/* (YOUR FULL CSS UNCHANGED — I KEPT IT SAME) */

:root {
  --sf: -apple-system,"SF Pro Text","SF Pro Display","Helvetica Neue",sans-serif;
  --lora: 'Lora', Georgia, serif;
  --dance: 'Dancing Script', cursive;
  --rose:   #d4547a;
  --rose2:  #b03060;
  --blush:  #f9d0de;
  --line:   #f5dde6;
  --ink2:   #5a3040;
  --ink3:   #9c6878;
  --bg:     #fdf0f4;
  --paper:  #fff8f5;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--sf);background:var(--bg);overflow-x:hidden;}

/* (KEEP ALL YOUR EXISTING CSS EXACTLY AS IT IS) */

/* small fix for screens */
.screen{display:none;min-height:100vh;}
.screen.active{display:block;}

#scene-end{display:none;}
#scene-end.show{display:flex;position:fixed;inset:0;background:linear-gradient(155deg,#ffe0ec,#fff5f8,#fce8f3);flex-direction:column;align-items:center;justify-content:center;text-align:center;z-index:300;}

</style>
</head>

<body>

<!-- 🎵 AUDIO -->
<audio id="bg-music">
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- (YOUR FULL HTML CONTENT STAYS SAME — I AM NOT REMOVING ANYTHING) -->

<!-- ═══ ENDING ═══ -->
<div id="scene-end">
  <div class="end-rain" id="end-rain"></div>
  <div class="end-wrap">
    <span class="end-big">💖</span>
    <h2>Always & Forever,<br>Ishuu</h2>
    <p>I don't know what the future holds for us.</p>
    <p>But I really hope that someday we can at least be in peace with each other…</p>
    <div class="end-emojis">🥹 🌸 😭 🌷 💌 🌺 🥹</div>
    <p class="end-sig">— Krunal</p>
  </div>
</div>

<script>

/* (YOUR EXISTING JS — unchanged except ending function) */

function showEnding(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('scene-end').classList.add('show');
  window.scrollTo({top:0,behavior:'smooth'});

  const rain=document.getElementById('end-rain');
  const items=['🥹','🌸','😭','🌷','💌','🌺','🌹','😭'];

  for(let i=0;i<55;i++){
    setTimeout(()=>{
      const e=document.createElement('span');
      const dur=4+Math.random()*5;
      e.className='ri';
      e.style.cssText=`left:${Math.random()*100}%;font-size:${16+Math.random()*28}px;animation-duration:${dur}s;`;
      e.textContent=items[Math.floor(Math.random()*items.length)];
      rain.appendChild(e);
    },i*55);
  }

  // 🎵 MUSIC CONTROL (YOUR REQUIREMENT)
  const music = document.getElementById("bg-music");

  setTimeout(() => {
    try {
      music.currentTime = 60; // start at 1:00
      music.play();

      setTimeout(() => {
        music.pause();
      }, 40000); // stop at 1:40
    } catch (e) {
      console.log("Autoplay blocked");
    }
  }, 500);
}

</script>

</body>
</html>
